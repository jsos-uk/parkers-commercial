backend:
  name: github
  repo: your-github-username/your-repo-name # You will change this to your actual repo
  branch: main # The branch you want to update

media_folder: "images" # Where your uploaded images get saved
public_folder: "/images"

collections:
  # We use a "files" collection because you have specific, unique pages
  - name: "pages"
    label: "Website Pages"
    files:
      # --- HOME PAGE ---
      - file: "index.html"
        label: "Home Page"
        name: "home"
        fields:
          - { label: "Page Title (SEO)", name: "title", widget: "string", default: "Parkers Commercial | Delivering a higher standard" }
          - { label: "Hero Main Heading", name: "hero_heading", widget: "string", default: "Delivering a Higher Standard." }
          - { label: "Hero Subtext", name: "hero_subtext", widget: "text" }
          # Stats Section
          - label: "Company Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Stat Value (e.g., 35+ Years)", name: "value", widget: "string" }
              - { label: "Stat Label (e.g., Industry Experience)", name: "label", widget: "string" }

      # --- POST-CONSTRUCTION PAGE ---
      - file: "post-construction-sparkle.html"
        label: "Post-Construction Page"
        name: "post_construction"
        fields:
          - { label: "Hero Heading", name: "hero_heading", widget: "string", default: "Post-Construction" }
          - { label: "Hero Subheading", name: "hero_sub", widget: "string", default: "From Site To Handover" }
          - { label: "Philosophy Title", name: "philosophy_title", widget: "string", default: "Flawless Presentation for Final Handover." }
          - { label: "Philosophy Text", name: "philosophy_body", widget: "markdown" }
          # Methodology Section
          - label: "Methodology Steps"
            name: "methodology"
            widget: "list"
            fields:
              - { label: "Step Number", name: "number", widget: "string" }
              - { label: "Step Title", name: "title", widget: "string" }
              - { label: "Step Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
